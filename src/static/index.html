<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="branch-network" aria-hidden="true">
      <span class="branch branch-one"></span>
      <span class="branch branch-two"></span>
      <span class="branch branch-three"></span>
      <span class="branch-node node-one"></span>
      <span class="branch-node node-two"></span>
      <span class="branch-node node-three"></span>
      <span class="branch-node node-four"></span>
    </div>

    <header>
      <div class="header-copy">
        <p class="eyebrow">Go Gators</p>
        <h1>Mergington High School</h1>
        <h2>Extracurricular Activities</h2>
        <p class="header-text">
          Discover clubs, teams, and classes in a school theme that finally
          matches Mergington pride.
        </p>
      </div>
      <div class="mascot-strip">
        <figure class="mascot-card">
          <img
            src="https://octodex.github.com/images/original.png"
            alt="Original Octocat mascot"
          />
          <figcaption>Original Mascot</figcaption>
        </figure>
        <figure class="mascot-card accent-card">
          <img
            src="https://octodex.github.com/images/Professortocat_v2.png"
            alt="Professortocat mascot"
          />
          <figcaption>Professortocat</figcaption>
        </figure>
      </div>
    </header>

    <main>
      <section id="activities-container">
        <h3>Available Activities</h3>
        <div id="activities-list">
          <!-- Activities will be loaded here -->
          <p>Loading activities...</p>
        </div>
      </section>

      <section id="signup-container">
        <h3>Sign Up for an Activity</h3>
        <form id="signup-form">
          <div class="form-group">
            <label for="email">Student Email:</label>
            <input type="email" id="email" required placeholder="your-email@mergington.edu" />
          </div>
          <div class="form-group">
            <label for="activity">Select Activity:</label>
            <select id="activity" required>
              <option value="">-- Select an activity --</option>
              <!-- Activity options will be loaded here -->
            </select>
          </div>
          <button type="submit">Sign Up</button>
        </form>
        <div id="message" class="hidden"></div>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 Mergington High School</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
